name: Build & Push

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:latest
            ${{ env.IMAGE_PREFIX }}/web:${{ github.sha }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/worker:latest
            ${{ env.IMAGE_PREFIX }}/worker:${{ github.sha }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.bull-board
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/bull-board:latest
            ${{ env.IMAGE_PREFIX }}/bull-board:${{ github.sha }}
