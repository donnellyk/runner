[tools]
node = "23.5.0"
pnpm = "10"

[env]
_.file = ".env"

[tasks.dev]
description = "Start infra and all apps"
run = """
docker compose up postgres redis -d
until docker compose exec postgres pg_isready -U postgres > /dev/null 2>&1; do sleep 1; done
pnpm -r --parallel dev
"""

[tasks.up]
description = "Full docker compose up (all services)"
run = "docker compose up --build"

[tasks.down]
description = "Stop all docker compose services"
run = "docker compose down"

[tasks.test]
description = "Run tests"
run = "pnpm run test"

[tasks.lint]
description = "Run linter"
run = "pnpm run lint"

[tasks.typecheck]
description = "Run type checking"
run = "pnpm run typecheck"

[tasks.check]
description = "Run typecheck + lint + test"
run = "pnpm run check"

[tasks.build]
description = "Build all packages"
run = "pnpm run build"

[tasks.deploy]
description = "Deploy to carthage"
run = """
echo "Deploying to carthage..."
ssh carthage 'mkdir -p /opt/web-runner/scripts'
rsync -av --relative \
  docker-compose.yml \
  Caddyfile \
  carthage:/opt/web-runner/
ssh carthage 'cd /opt/web-runner && docker compose pull && docker compose up -d'
"""

[tasks.ci]
description = "Watch CI & Build status for the latest commit"
run = "./scripts/ci-watch.sh"

[tasks.backup]
description = "Backup database"
run = "./scripts/backup.sh"

[tasks.restore]
description = "Restore database from backup"
usage = "restore <file>"
run = "./scripts/restore.sh {{arg(name=\"file\")}}"

[tasks."webhook:subscribe"]
description = "Create Strava webhook subscription"
run = "pnpm tsx scripts/webhook-manage.ts subscribe {{arg(name='url')}}"

[tasks."webhook:list"]
description = "List Strava webhook subscriptions"
run = "pnpm tsx scripts/webhook-manage.ts list"

[tasks."webhook:delete"]
description = "Delete Strava webhook subscription"
run = "pnpm tsx scripts/webhook-manage.ts delete"

[tasks."webhook:simulate"]
description = "Simulate a Strava webhook event"
run = "pnpm tsx scripts/simulate-webhook.ts"

[tasks."seed:dump"]
description = "Dump activity data for dev seeding"
run = """
docker compose exec postgres pg_dump -U postgres -d webrunner \
  --data-only -t users -t oauth_accounts -t activities -t activity_laps -t activity_streams -t activity_segments \
  | gzip > scripts/seed.sql.gz
echo "Seed dump saved to scripts/seed.sql.gz"
"""

[tasks."seed:restore"]
description = "Restore seed data to database"
run = """
gunzip -c scripts/seed.sql.gz | docker compose exec -T postgres psql -U postgres -d webrunner
echo "Seed data restored"
"""

[tasks.migrate]
description = "Run database migrations"
run = "pnpm --filter @web-runner/db migrate:run"

[tasks."bull-board"]
description = "Run Bull Board queue dashboard"
run = "pnpm tsx scripts/bull-board.ts"

[tasks.console]
description = "Node REPL with DB, Redis, Strava, and queue pre-loaded"
run = "pnpm tsx scripts/console.ts"

[tasks."console:prod"]
description = "Node REPL against production (via SSH)"
run = """
HOST="${PROD_HOST:-carthage}"
echo "Opening SSH tunnels to $HOST..."
ssh -f -N -L 15432:localhost:5432 -L 16379:localhost:6379 "$HOST"
trap 'pkill -f "ssh -f -N -L 15432:localhost:5432 -L 16379:localhost:6379 $HOST"' EXIT
DATABASE_URL=postgresql://postgres:postgres@localhost:15432/webrunner \
REDIS_URL=redis://localhost:16379 \
pnpm tsx scripts/console.ts
"""

[tasks."wipe:imported"]
description = "Delete bulk-imported activities (source_raw IS NULL)"
run = """
COUNT=$(docker compose exec -T postgres psql -U postgres -d webrunner -t -c "SELECT count(*) FROM activities WHERE source_raw IS NULL;")
COUNT=$(echo "$COUNT" | tr -d ' ')
if [ "$COUNT" = "0" ]; then echo "No imported activities to delete."; exit 0; fi
echo "This will delete $COUNT bulk-imported activities (and their laps, streams, segments)."
printf "Continue? [y/N] "
read -r confirm
if [ "$confirm" != "y" ] && [ "$confirm" != "Y" ]; then echo "Aborted."; exit 0; fi
docker compose exec postgres psql -U postgres -d webrunner \
  -c "DELETE FROM activities WHERE source_raw IS NULL;" \
  -c "SELECT count(*) AS remaining FROM activities;"
"""

[tasks."wipe:activities"]
description = "Delete all activities for a user (cascades to laps, streams, segments)"
run = """
echo "This will delete ALL activities for a user (cascades to laps, streams, segments)."
printf "Continue? [y/N] "
read -r confirm
if [ "$confirm" != "y" ] && [ "$confirm" != "Y" ]; then echo "Aborted."; exit 0; fi
pnpm tsx scripts/wipe-activities.ts {{arg(name='user', default='first')}}
"""

[tasks."admin:promote"]
description = "Promote a user to admin"
run = "pnpm tsx scripts/admin-promote.ts {{arg(name='user', default='first')}}"

[tasks.studio]
description = "Run Drizzle Kit Studio (local DB)"
run = "pnpm --filter @web-runner/db drizzle-kit studio"

[tasks."studio:prod"]
description = "Run Drizzle Kit Studio against prod via SSH tunnel"
run = """
HOST="${PROD_HOST:-carthage}"
echo "Opening SSH tunnel to $HOST Postgres..."
ssh -f -N -L 15432:localhost:5432 "$HOST"
trap 'pkill -f "ssh -f -N -L 15432:localhost:5432 $HOST"' EXIT
DATABASE_URL=postgresql://postgres:postgres@localhost:15432/webrunner pnpm --filter @web-runner/db drizzle-kit studio
"""
